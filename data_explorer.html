const tables = Object.keys(DATA);
let activeTable = tables[0];

function formatNum(n) {
  return n ? n.toLocaleString() : '0';
}

function typeBadge(t) {
  if (t.includes('INT') || t.includes('DECIMAL') || t.includes('DOUBLE') || t.includes('FLOAT')) return '<span class="badge badge-num">' + t + '</span>';
  if (t.includes('DATE') || t.includes('TIME')) return '<span class="badge badge-date">' + t + '</span>';
  return '<span class="badge badge-str">' + t + '</span>';
}

function renderNav() {
  const nav = document.getElementById('nav');
  nav.innerHTML = tables.map(t => {
    const d = DATA[t];
    const label = d.label || t;
    return `<button onclick="showTable('${t}')" class="${t === activeTable ? 'active' : ''}" id="btn-${t}">${label}</button>`;
  }).join('');
}

function showTable(t) {
  activeTable = t;
  document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + t).classList.add('active');
  render();
}

function render() {
  const d = DATA[activeTable];
  const content = document.getElementById('content');

  if (d.error) {
    content.innerHTML = `<div class="card"><h2>${d.label}</h2><div class="error">Error: ${d.error}</div></div>`;
    return;
  }

  let html = `<div class="card">
    <h2>${d.label}</h2>
    <div class="desc">${d.desc}</div>
    <div class="stats-row">
      <div class="stat"><div class="label">Total Rows (US)</div><div class="value">${formatNum(d.total_rows)}</div></div>
      <div class="stat"><div class="label">California Rows</div><div class="value">${formatNum(d.ca_rows)}</div></div>
      <div class="stat"><div class="label">Columns</div><div class="value">${d.columns ? d.columns.length : 0}</div></div>
      <div class="stat"><div class="label">CA %</div><div class="value">${d.total_rows ? (d.ca_rows / d.total_rows * 100).toFixed(1) + '%' : 'N/A'}</div></div>
    </div>
  </div>`;

  // Column stats
  if (d.col_stats && d.col_stats.length > 0) {
    html += `<div class="card"><div class="section-title">Column Details (first 30)</div><div class="col-stat-grid">`;
    for (const cs of d.col_stats) {
      let meta = `Null: ${cs.null_pct}%`;
      if (cs.distinct !== undefined) meta += ` · Distinct: ${formatNum(cs.distinct)}`;
      if (cs.min !== undefined) meta += ` · Range: ${cs.min} — ${cs.max} · Avg: ${cs.avg}`;

      let topVals = '';
      if (cs.top_values && cs.top_values.length > 0) {
        topVals = '<div class="top-vals">Top: ' + cs.top_values.map(v => `<span>${v[0]} (${formatNum(v[1])})</span>`).join('') + '</div>';
      }

      html += `<div class="col-card">
        <span class="col-name">${cs.name}</span> ${typeBadge(cs.type)}
        <div class="col-meta">${meta}</div>
        ${cs.error ? '<div class="col-meta" style="color:#ff3b30">⚠️ ' + cs.error + '</div>' : ''}
        ${topVals}
      </div>`;
    }
    html += `</div></div>`;
  }

  // Sample data
  if (d.sample && d.sample.length > 0 && d.col_names) {
    html += `<div class="card"><div class="section-title">Sample Data (20 rows, CA)</div>
      <div class="table-scroll"><table><thead><tr>`;
    for (const c of d.col_names) {
      html += `<th>${c}</th>`;
    }
    html += `</tr></thead><tbody>`;
    for (const row of d.sample) {
      html += '<tr>' + row.map(v => `<td title="${v}">${v}</td>`).join('') + '</tr>';
    }
    html += `</tbody></table></div></div>`;
  }

  // All columns list
  if (d.columns) {
    html += `<div class="card"><div class="section-title">All Columns (${d.columns.length})</div>
      <div class="table-scroll"><table><thead><tr><th>#</th><th>Column</th><th>Type</th></tr></thead><tbody>`;
    d.columns.forEach((c, i) => {
      html += `<tr><td>${i+1}</td><td><strong>${c.name}</strong></td><td>${typeBadge(c.type)}</td></tr>`;
    });
    html += `</tbody></table></div></div>`;
  }

  content.innerHTML = html;
}

renderNav();
render();
</script>
